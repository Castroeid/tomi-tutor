<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tomi-reading-tutor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-card">
        <h1>הַמּוֹרָה שֶׁל טוֹמִי</h1>
        <p class="subtitle">לוֹמְדִים לִקְרוֹא וְלִכְתּוֹב בִּצְעָדִים קְטַנִּים וּנְעִימִים.</p>
      </header>

      <section class="lesson-progress card" aria-live="polite">
        <h2 id="lesson-title">טוֹעֵן שִׁעוּר…</h2>
        <p id="step-counter"></p>
        <p id="status-message" class="status-message"></p>
      </section>

      <section class="step-content card" id="step-container" aria-live="polite">
        <h3 id="step-title"></h3>
        <p id="step-text"></p>

        <section id="worksheet" class="worksheet" hidden>
          <h4 id="worksheet-instruction">בַּמָּה מַתְחִילָה כָּל מִלָּה? נִבְחַר יַחַד.</h4>
          <p id="worksheet-progress" class="worksheet-progress"></p>
          <div id="syllable-grid" class="syllable-grid"></div>
          <div id="picture-grid" class="picture-grid"></div>
        </section>

        <div id="choice-grid" class="choice-grid" hidden></div>

        <div id="writing-prompt" class="writing-prompt" hidden>
          <p>✍️ כְּתוֹב בַּמַּחְבֶּרֶת שֶׁלְּךָ, וּכְשֶׁתְּסַיֵּם לְחַץ "הִצְלַחְתִּי".</p>
        </div>

        <section id="lesson-ending" class="lesson-ending" hidden>
          <h4>אֵיךְ הָיָה לְךָ הַיּוֹם?</h4>
          <div class="ending-grid">
            <button type="button" class="big-btn ending-btn" data-feeling="easy">קַל</button>
            <button type="button" class="big-btn ending-btn" data-feeling="ok">בְּסֵדֶר</button>
            <button type="button" class="big-btn ending-btn" data-feeling="hard">קָשֶׁה</button>
            <button type="button" class="big-btn ending-btn" data-feeling="fun">כֵּיף</button>
          </div>
        </section>
      </section>

      <section class="controls card">
        <div class="button-row">
          <button id="speak-again" class="big-btn">שְׁמַע שׁוּב</button>
          <button id="ready-btn" class="big-btn primary">אֲנִי מוּכָן</button>
        </div>
        <div class="button-row">
          <button id="record-btn" class="big-btn">הַקְלֵט אוֹתִי</button>
          <button id="play-recording-btn" class="big-btn" disabled>שְׁמַע אוֹתִי</button>
        </div>
        <div class="button-row">
          <button id="success-btn" class="big-btn success">הִצְלַחְתִּי</button>
          <button id="hard-btn" class="big-btn warning">הָיָה לִי קָשֶׁה</button>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
