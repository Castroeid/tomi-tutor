<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>טוֹמִי טוּטוֹר</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="entry-screen" class="card entry-screen" aria-live="polite">
        <h1>טוֹמִי טוּטוֹר</h1>
        <div class="avatar-area" aria-label="אֲזוֹר הָאַוָטָאר שֶׁל לֵיאוֹ">
          <div id="leo-avatar" class="avatar-face" role="img" aria-label="לֵיאוֹ"></div>
          <div>
            <h2>לֵיאוֹ</h2>
            <p>מוֹרֶה נָעִים וְחָבֵר לַשִּׁעוּר.</p>
          </div>
        </div>
        <button id="enter-btn" class="big-btn primary entry-btn">הִכָּנֵס</button>
      </section>

      <section id="pre-lesson" class="card" hidden>
        <h3>אַתָּה רוֹצֶה לְדַבֵּר קְצָת לִפְנֵי שֶׁמַּתְחִילִים?</h3>
        <div class="button-row">
          <button id="talk-yes-btn" class="big-btn">כֵּן</button>
          <button id="talk-no-btn" class="big-btn primary">לֹא, נַתְחִיל</button>
        </div>
      </section>

      <section id="talk-panel" class="card" hidden>
        <h3>מָה אַתָּה רוֹצֶה לְסַפֵּר לִי?</h3>
        <p id="talk-status" class="status-message"></p>
        <div class="button-row single">
          <button id="talk-record-btn" class="big-btn">הַקְלֵט</button>
        </div>
        <div class="button-row single">
          <button id="to-lesson-btn" class="big-btn success">מַשְׁמִיכִים לַשִּׁעוּר</button>
        </div>
      </section>

      <section id="voice-warning" class="card parent-warning" hidden></section>

      <section id="lesson-menu" class="card" hidden>
        <h2 id="lesson-title"></h2>
        <div id="exercise-list" class="exercise-list"></div>
      </section>

      <section id="exercise-panel" class="card" hidden>
        <h3 id="exercise-title"></h3>
        <p id="exercise-text"></p>
        <p id="status-message" class="status-message"></p>

        <section id="match-area" class="worksheet" hidden>
          <h4 id="match-instruction"></h4>
          <p id="match-progress"></p>
          <div id="sound-grid" class="sound-grid"></div>
          <div id="picture-grid" class="picture-grid"></div>
        </section>

        <section id="choice-area" class="choice-grid" hidden></section>

        <section id="read-area" class="read-area" hidden>
          <p id="read-syllables"></p>
        </section>

        <section id="writing-area" class="writing-area" hidden>
          <p>✍️ כְּתוֹב אֶת הַהֲבָרָה בַּמַּחְבֶּרֶת, וּכְשֶׁסִּיַּמְתָּ לַחַץ "הִצְלַחְתִּי".</p>
        </section>

        <div class="button-row controls-row">
          <button id="speak-again" class="big-btn">שְׁמַע שׁוּב</button>
          <button id="success-btn" class="big-btn success">הִצְלַחְתִּי</button>
          <button id="hard-btn" class="big-btn warning">הָיָה לִי קָשֶׁה</button>
        </div>
      </section>

      <section id="ending-panel" class="card" hidden>
        <h3>אֵיךְ הָיָה לְךָ הַיּוֹם?</h3>
        <div class="ending-grid">
          <button class="big-btn ending-btn" data-mood="קַל">קַל</button>
          <button class="big-btn ending-btn" data-mood="בְּסֵדֶר">בְּסֵדֶר</button>
          <button class="big-btn ending-btn" data-mood="קָשֶׁה">קָשֶׁה</button>
          <button class="big-btn ending-btn" data-mood="כֵּיף">כֵּיף</button>
        </div>
      </section>

      <section id="parent-panel" class="card" hidden>
        <h3>לוּחַ הוֹרִים</h3>
        <ul id="parent-stats"></ul>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
